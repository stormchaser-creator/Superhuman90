        'The JSON must have this exact structure: {"items":[{"name":"food name","cal":number,"protein":number,"carbs":number,"fat":number,"serving":"amount"}],"cal":total,"protein":total,"carbs":total,"fat":total}. ' +
        "User input: " + foodText;
      const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + encodeURIComponent(calorieApiKey), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: promptText }] }],
          generationConfig: { maxOutputTokens: 1024, thinkingConfig: { thinkingBudget: 0 } },
        }),
      });
      if (!res.ok) {
        var errBody = await res.text();
        throw new Error("API error " + res.status + ": " + errBody.slice(0, 200));
      }
      var result = await res.json();
      var responseText = "";
      if (result.candidates && result.candidates[0] && result.candidates[0].content) {
        result.candidates[0].content.parts.forEach(function(p) {
          if (p.text && !p.thought) responseText += p.text;
        });
      }
      console.log("Gemini raw response:", JSON.stringify(result, null, 2));
      console.log("Extracted responseText:", responseText);
      // Extract JSON from response (strip any markdown fences if present)
      var jsonMatch = responseText.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("Could not parse nutrition data. Raw: " + responseText.slice(0, 200));
      var data;
      try { data = JSON.parse(jsonMatch[0]); } catch (pe) {
        throw new Error("JSON parse failed: " + pe.message + ". Text: " + jsonMatch[0].slice(0, 200));
      }
      if (!data.items || data.items.length === 0) { setFoodError("No results — try being more specific"); setFoodLoading(false); return; }
      var items = data.items.map(function(it) {
        return {
          name: it.name, cal: Math.round(it.cal || 0), protein: Math.round(it.protein || 0),
          carbs: Math.round(it.carbs || 0), fat: Math.round(it.fat || 0),
          serving: it.serving || "",
        };
      });
      var totals = items.reduce(function(s, i) { return { cal: s.cal + i.cal, protein: s.protein + i.protein, carbs: s.carbs + i.carbs, fat: s.fat + i.fat }; }, { cal: 0, protein: 0, carbs: 0, fat: 0 });
      setFoodPending({ text: foodText, category: detected.category, items: items, cal: totals.cal, protein: totals.protein, carbs: totals.carbs, fat: totals.fat, time: new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) });
      setFoodInput("");
    } catch (e) { setFoodError(e.message || "Failed to estimate"); }
    setFoodLoading(false);
  };
  const addFoodEntry = () => {
    if (!foodPending) return;
    var newEntry = { ...foodPending, id: Date.now() };
    setFoodLog(prev => {
      const dayLog = prev[selectedDate] || { entries: [] };
      return { ...prev, [selectedDate]: { entries: [...dayLog.entries, newEntry] } };
    });
    syncFoodEntry(newEntry, selectedDate);
    toggleHabit(5, true);
    setFoodPending(null); setFoodInput("");
  };
  const removeFoodEntry = (id) => {
    setFoodLog(prev => {
      const dayLog = prev[selectedDate];
      if (!dayLog) return prev;
      const entries = dayLog.entries.filter(e => e.id !== id);
      if (entries.length === 0) { toggleHabit(5, false); }
      return { ...prev, [selectedDate]: { entries } };
    });
  };
  const getDayFoodTotals = (date) => {
    const entries = foodLog[date]?.entries || [];
    return entries.reduce((s, e) => ({ cal: s.cal + e.cal, protein: s.protein + e.protein, carbs: s.carbs + e.carbs, fat: s.fat + e.fat }), { cal: 0, protein: 0, carbs: 0, fat: 0 });
  };
  const startListening = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setFoodError("Voice not supported in this browser"); return; }
    const recognition = new SR();
    recognition.lang = "en-US"; recognition.interimResults = false;
    recognition.onresult = (e) => { setFoodInput(e.results[0][0].transcript); setIsListening(false); };
    recognition.onerror = () => setIsListening(false);
    recognition.onend = () => setIsListening(false);
    setIsListening(true);
    recognition.start();
  };

  // Workout selection helpers
  const WORKOUT_DAY_OPTIONS = [
    { day: 1, label: "LEG A" },
    { day: 2, label: "TOR A" },
    { day: 3, label: "ARM A" },
    { day: 4, label: "LEG B" },
    { day: 5, label: "TOR B" },
    { day: 6, label: "ARM B" },
  ];
  const getWorkoutSelection = () => workoutSelection[selectedDate] || null;
  const selectWorkout = (dayOption) => {
    setWorkoutSelection(prev => ({
      ...prev,
      [selectedDate]: dayOption
    }));
    toggleHabit(3, true);
    syncWorkoutSelection(selectedDate, dayOption);
  };

  // ── Weight Logging Helpers ──
  const selectedWeight = weightLog[selectedDate] || null;
  
  const getSortedWeights = () => {
    return Object.entries(weightLog)
      .filter(([_, v]) => v > 0)
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([date, weight]) => ({ date, weight }));
  };
  
  const sortedWeights = getSortedWeights();
  const selectedWeightIdx = sortedWeights.findIndex(e => e.date === selectedDate);
  const prevWeightEntry = selectedWeightIdx > 0 ? sortedWeights[selectedWeightIdx - 1] : (sortedWeights.length > 0 && !selectedWeight ? sortedWeights[sortedWeights.length - 1] : null);
  const weightChange = selectedWeight && prevWeightEntry ? (selectedWeight - prevWeightEntry.weight) : null;
  
  const allWeights = sortedWeights.map(e => e.weight);
  const startWeight = allWeights.length > 0 ? allWeights[0] : null;
  const currentWeight = allWeights.length > 0 ? allWeights[allWeights.length - 1] : null;
  const totalChange = startWeight && currentWeight ? currentWeight - startWeight : null;
  
  const logWeight = (val) => {
    const num = parseFloat(val);
    if (!isNaN(num) && num > 0) {
      setWeightLog(prev => ({ ...prev, [selectedDate]: num }));
      setWeightInput(String(num));
      setWeightLogAnim(true);
      setTimeout(() => setWeightLogAnim(false), 600);
      toggleHabit(4, true);
      syncWeight(selectedDate, num);
    }
  };

  const commitWeightInput = () => {
    const v = parseFloat(weightInput);
    if (!isNaN(v) && v > 50 && v < 500) {
      setWeightLog(prev => ({ ...prev, [selectedDate]: v }));
      setWeightInput(String(v));
      toggleHabit(4, true);
      syncWeight(selectedDate, v);
    } else if (weightInput === "") {
      setWeightLog(prev => { const n = {...prev}; delete n[selectedDate]; return n; });
    }
  };
  
  const adjustWeight = (delta) => {
    const current = selectedWeight || parseFloat(weightInput) || (prevWeightEntry?.weight) || 160;
    const newVal = Math.round((current + delta) * 10) / 10;
    setWeightLog(prev => ({ ...prev, [selectedDate]: newVal }));
    setWeightInput(String(newVal));
    setWeightLogAnim(true);
    setTimeout(() => setWeightLogAnim(false), 600);
    toggleHabit(4, true);
    syncWeight(selectedDate, newVal);
  };
  
  const last7Weights = sortedWeights.slice(-7);

  // Resolve swap with cross-week fallback (same exercise on same day carries across weeks)
  const resolveSwap = (w, d, exName) => {
    const key = `${w}-${d}-${exName}`;
    if (swappedExercises[key]) return swappedExercises[key];
    for (let wk = w - 1; wk >= 1; wk--) {
      const fb = `${wk}-${d}-${exName}`;
      if (swappedExercises[fb]) return swappedExercises[fb];
    }
    for (let wk = w + 1; wk <= 12; wk++) {
      const fb = `${wk}-${d}-${exName}`;
      if (swappedExercises[fb]) return swappedExercises[fb];
    }
    return exName;
  };

  const resolveDisplay = (w, d, exName) => {
    const swapped = resolveSwap(w, d, exName);
    if (swapped !== exName) return swapped; // manual swap takes priority
    if (workoutMode === "home") {
      const alts = ALTERNATIVES[exName] || [];
      const homeAlt = alts.find(a => a.startsWith("H: "));
      if (homeAlt) return homeAlt;
    }
    if (workoutMode === "bodyweight") {
      const alts = ALTERNATIVES[exName] || [];
      const bwAlt = alts.find(a => a.startsWith("BW: "));
      if (bwAlt) return bwAlt;
    }
    return exName;
  };
  const displayName = (exName) => resolveDisplay(week, day, exName);

  const swapExercise = (originalName, newName) => {
    const key = `${week}-${day}-${originalName}`;
    setSwappedExercises(prev => ({ ...prev, [key]: newName }));
    setShowAlts(null);
    syncExerciseSwap(week, day, originalName, newName);
  };

  return (
    <div style={{
      fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif",
      background: t.bg, color: t.text, height: "100vh",
      maxWidth: 430, margin: "0 auto", position: "relative",
      display: "flex", flexDirection: "column", overflow: "hidden",
    }}>
      {/* ── Header ── */}
      <div className="safe-top" style={{ background: t.bg }}>
        <div style={{
          padding: "12px 20px 12px", display: "flex", alignItems: "center",
          justifyContent: "space-between", borderBottom: `1px solid ${t.border}`,
        }}>
          <div>
            <div style={{ fontSize: fs(11), fontWeight: 500, color: t.accent, letterSpacing: 2, textTransform: "uppercase", fontFamily: "'DM Mono', monospace" }}>
              SUPERHUMAN 90
            </div>
            <div style={{ fontSize: fs(13), color: t.textDim, marginTop: 2 }}>
              {phaseLabel} · {phaseWeeks}
            </div>
          </div>
          {profile.name && (
            <div style={{ fontSize: fs(13), color: t.textDim, fontWeight: 500 }}>
              {profile.name.split(" ")[0]}
            </div>
          )}
        </div>
      </div>

      {/* ── Date Navigator ── */}
      <div style={{
        padding: "12px 16px 10px",
        borderBottom: `1px solid ${t.border}`,
        background: t.bg,
      }}>
        {/* Week navigation row */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <button onClick={() => shiftWeek(-1)}
            style={{
              width: 32, height: 32, borderRadius: 8, border: `1px solid ${t.border}`,
              background: t.card, color: t.text, cursor: "pointer", fontSize: fs(14),
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>◂</button>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: fs(14), fontWeight: 600 }}>{weekLabel}</div>
            {programDay > 0 && programDay <= 90 && (
              <div style={{ fontSize: fs(11), color: t.accent, fontFamily: "'DM Mono', monospace", fontWeight: 600 }}>
                Program Day {programDay} of 90
              </div>
            )}
          </div>
          <button onClick={() => shiftWeek(1)}
            style={{
              width: 32, height: 32, borderRadius: 8, border: `1px solid ${t.border}`,
              background: t.card, color: t.text, cursor: "pointer", fontSize: fs(14),
              display: "flex", alignItems: "center", justifyContent: "center",
              opacity: (() => { const nextMon = new Date(weekDays[0] + "T12:00:00"); nextMon.setDate(nextMon.getDate() + 7); return toLocalDateStr(nextMon) <= todayStr; })() ? 1 : 0.3,
            }}>▸</button>
        </div>

        {/* 7-day week grid */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
          {weekDays.map(ds => {
            const d = new Date(ds + "T12:00:00");
            const dayName = d.toLocaleDateString(undefined, { weekday: "short" }).toUpperCase();
            const dayNum = d.getDate();
            const monthShort = d.toLocaleDateString(undefined, { month: "short" }).toUpperCase();
            const isSel = ds === selectedDate;
            const isTodayDate = ds === todayStr;
            const isFuture = ds > todayStr;
            const hasW = dateHasWorkout(ds);
            const hasH = dateHasHabits(ds);
            const hasWt = dateHasWeight(ds);
            const hasAny = hasW || hasH || hasWt;

            return (
              <button key={ds}
                onClick={() => setSelectedDate(ds)}
                style={{
                  padding: "6px 2px 5px",
                  borderRadius: 12,
                  border: isSel && !isTodayDate ? `2px solid ${t.accent}` : "2px solid transparent",
                  background: isTodayDate
                    ? t.gradient
                    : isSel ? t.accentGlow : "transparent",
                  cursor: "pointer",
                  opacity: 1,
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 0,
                  color: t.text, fontFamily: "'DM Mono', monospace",
                  position: "relative",
                  boxShadow: isTodayDate ? `0 3px 12px ${t.accent}50` : "none",
                  transition: "all 0.15s ease",
                }}>
                <span style={{
                  fontSize: fs(9), fontWeight: 600, letterSpacing: 0.5,
                  color: isTodayDate ? "rgba(255,255,255,0.8)" : t.textDim,
                }}>{dayName}</span>
                <span style={{
                  fontSize: fs(18), fontWeight: isTodayDate ? 800 : isSel ? 700 : 500,
                  color: isTodayDate ? "#fff" : isSel ? t.accent : t.text,
                  lineHeight: 1.3,
                }}>{dayNum}</span>
                {/* Show month abbreviation on 1st of month or first day in strip */}
                {(dayNum === 1 || ds === weekDays[0]) && (
                  <span style={{
                    fontSize: fs(7), fontWeight: 700, letterSpacing: 0.5,
                    color: isTodayDate ? "rgba(255,255,255,0.7)" : t.textDim,
                    lineHeight: 1,
                  }}>{monthShort}</span>
                )}
                {dayNum !== 1 && ds !== weekDays[0] && !isTodayDate && (
                  <div style={{ display: "flex", gap: 2, marginTop: 2, height: 5 }}>
                    {hasW && <div style={{ width: 5, height: 5, borderRadius: 3, background: t.success }} />}
                    {hasH && <div style={{ width: 5, height: 5, borderRadius: 3, background: t.accent }} />}
                    {hasWt && <div style={{ width: 5, height: 5, borderRadius: 3, background: t.warning }} />}
                  </div>
                )}
                {isTodayDate && (
                  <span style={{
                    fontSize: fs(7), fontWeight: 800, color: "#fff", letterSpacing: 1,
                    lineHeight: 1, marginTop: 1,
                  }}>TODAY</span>
                )}
                {!hasAny && !isTodayDate && dayNum !== 1 && ds !== weekDays[0] && (
                  <div style={{ height: 5, marginTop: 2 }} />
                )}
              </button>
            );
          })}
        </div>

        {/* Jump to today (if not in current week) */}
        {!weekDays.includes(todayStr) && (
          <button onClick={() => setSelectedDate(todayStr)}
            style={{
              width: "100%", marginTop: 8, padding: "7px", borderRadius: 8,
              border: "none", background: t.accent + "18", color: t.accent,
              fontSize: fs(12), fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
            }}>
            ↩ Back to Today
          </button>
        )}
      </div>
      {/* ── Content Area ── */}
      <div style={{ flex: 1, overflowY: "auto", overflowX: "hidden", paddingBottom: 160, WebkitOverflowScrolling: "touch" }}>

        {/* ═══ WORKOUT TAB ═══ */}
        {tab === "workout" && (
          <div style={{ padding: "16px 16px 0" }}>

            {/* Session Status Banner */}
            {(() => {
              // Get the workout label for the session
              const sessionWorkoutLabel = selectedSession?.week && selectedSession?.day
                ? WORKOUT_DATA[selectedSession.week]?.[selectedSession.day]?.label
                : null;

              // CASE 1: Completed session
              if (selectedSession?.status === "completed") {
                const compExercises = WORKOUT_DATA[selectedSession.week]?.[selectedSession.day]?.exercises || [];
                let compTotal = compExercises.length, compDone = 0;
                compExercises.forEach(ex => {
                  const dn = resolveDisplay(selectedSession.week, selectedSession.day, ex.name);
                  let allSetsDone = ex.sets > 0;
                  for (let si = 0; si < ex.sets; si++) {
                    if (!logData[`${selectedDate}-${dn}-${si}`]?.done) { allSetsDone = false; break; }
                  }
                  if (allSetsDone) compDone++;
                });
                const compPct = compTotal > 0 ? Math.round((compDone / compTotal) * 100) : 0;

                // Calculate workout duration
                let durationStr = "";
                if (selectedSession.startedAt && selectedSession.completedAt) {
                  const durSec = Math.floor((new Date(selectedSession.completedAt) - new Date(selectedSession.startedAt)) / 1000);
                  if (durSec > 0 && durSec < 86400) {
                    const h = Math.floor(durSec / 3600);
                    const m = Math.floor((durSec % 3600) / 60);
                    const s = durSec % 60;
                    durationStr = h > 0 ? `${h}h ${m}m` : `${m}:${s.toString().padStart(2, "0")}`;
                  }
                }

                // Calculate average workout duration
                let avgStr = "";
                const durations = Object.values(sessionLog).filter(s =>
                  s.status === "completed" && s.startedAt && s.completedAt
                ).map(s => Math.floor((new Date(s.completedAt) - new Date(s.startedAt)) / 1000))
                  .filter(d => d > 0 && d < 86400);
                if (durations.length > 1) {
                  const avgSec = Math.round(durations.reduce((a, b) => a + b, 0) / durations.length);
                  const ah = Math.floor(avgSec / 3600);
                  const am = Math.floor((avgSec % 3600) / 60);
                  avgStr = ah > 0 ? `${ah}h ${am}m` : `${am}m`;
                }

                return (
                  <div style={{
                    padding: "12px 14px", borderRadius: 12, marginBottom: 14,
                    background: t.card, border: `1px solid ${t.success}30`,
                  }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ fontSize: fs(18) }}>✅</span>
                        <div>
                          <div style={{ fontSize: fs(13), fontWeight: 600, color: t.success }}>
                            {sessionWorkoutLabel || "Workout"} — {compPct}%
                            {durationStr && <span style={{ fontWeight: 500, opacity: 0.85 }}> · {durationStr}</span>}
                          </div>
                          <div style={{ fontSize: fs(11), color: t.textDim, fontFamily: "'DM Mono', monospace" }}>
                            W{selectedSession.week} D{selectedSession.day} · {compDone}/{compTotal} exercises
                            {avgStr && ` · avg ${avgStr}`}
                          </div>
                        </div>
                      </div>
                      <button onClick={reopenSession}
                        style={{
                          padding: "5px 10px", borderRadius: 6, border: `1px solid ${t.border}`,
                          background: "transparent", color: t.textDim, fontSize: fs(11),
                          cursor: "pointer", fontFamily: "'DM Mono', monospace",
                        }}>
                        Edit
                      </button>
                    </div>
                    {/* Progress bar */}
                    <div style={{
                      marginTop: 8, height: 4, borderRadius: 2,
                      background: t.border, overflow: "hidden",
                    }}>
                      <div style={{
                        height: "100%", borderRadius: 2,
                        width: `${compPct}%`, background: t.success,
                      }} />
                    </div>
                  </div>
                );
              }
              // CASE 2: Active session (in progress)
              if (selectedSession?.status === "active") {
                // Calculate workout completion %
                const sessionExercises = WORKOUT_DATA[selectedSession.week]?.[selectedSession.day]?.exercises || [];
                let totalEx = sessionExercises.length, doneEx = 0;
                sessionExercises.forEach(ex => {
                  const dn = resolveDisplay(selectedSession.week, selectedSession.day, ex.name);
                  let allSetsDone = ex.sets > 0;
                  for (let si = 0; si < ex.sets; si++) {
                    if (!logData[`${selectedDate}-${dn}-${si}`]?.done) { allSetsDone = false; break; }
                  }
                  if (allSetsDone) doneEx++;
                });
                const pct = totalEx > 0 ? Math.round((doneEx / totalEx) * 100) : 0;

                return (
                  <div style={{
                    padding: "12px 14px", borderRadius: 12, marginBottom: 14,
                    background: t.success + "10", border: `1px solid ${t.success}30`,
                  }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{
                          width: 10, height: 10, borderRadius: "50%", background: t.success,
                          boxShadow: `0 0 8px ${t.success}80`,
                          animation: "pulse 2s ease-in-out infinite",
                        }} />
                        <div>
                          <div style={{ fontSize: fs(13), fontWeight: 600, color: t.success }}>
                            {sessionWorkoutLabel || "Workout"} — {pct}%
                          </div>
                          <div style={{ fontSize: fs(11), color: t.textDim, fontFamily: "'DM Mono', monospace" }}>
                            W{selectedSession.week} D{selectedSession.day} · {doneEx}/{totalEx} exercises
                            {elapsed && ` · ${elapsed}`}
                          </div>
                        </div>
                      </div>
                      <button onClick={completeSession}
                        style={{
                          padding: "8px 16px", borderRadius: 8, border: "none",
                          background: t.success, color: "#fff", fontSize: fs(13),
                          fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                        }}>
                        Finish ✓
                      </button>
                    </div>
                    {/* Progress bar */}
                    <div style={{
                      marginTop: 8, height: 4, borderRadius: 2,
                      background: t.border, overflow: "hidden",
                    }}>
                      <div style={{
                        height: "100%", borderRadius: 2,
                        width: `${pct}%`, background: t.success,
                        transition: "width 0.3s ease",
                      }} />
                    </div>
                  </div>
                );
              }
              // CASE 3: No session — Today → Start, Past → Rest Day, Future → Preview
              const isFutureDate = selectedDate > todayStr;
              const nextPos = getNextWorkoutPosition();
              const completedCount = Object.values(sessionLog).filter(s => s.status === "completed").length;

              // Program complete
              if (completedCount >= 72 && !isFutureDate && !isPastDate) {
                return (
                  <div style={{
                    padding: "20px 14px", borderRadius: 14, marginBottom: 14,
                    background: t.card, border: `2px solid ${t.success}`,
                    textAlign: "center",
                  }}>
                    <div style={{ fontSize: fs(28), marginBottom: 6 }}>🏆</div>
                    <div style={{ fontSize: fs(16), fontWeight: 700, color: t.success }}>Program Complete!</div>
                    <div style={{ fontSize: fs(12), color: t.textDim, marginTop: 4 }}>All 72 workouts finished. You did it.</div>
                  </div>
                );
              }

              // Past date with no session → Rest Day
              if (isPastDate) {
                return (
                  <div style={{
                    padding: "14px", borderRadius: 14, marginBottom: 14,
                    background: t.card, border: `1px solid ${t.border}`,
                    textAlign: "center",
                  }}>
                    <div style={{ fontSize: fs(13), color: t.textDim, marginBottom: 2 }}>{selectedDateLabel}</div>
                    <div style={{ fontSize: fs(15), fontWeight: 600, color: t.textDim }}>Rest Day</div>
                    <button onClick={logPastSession}
                      style={{
                        marginTop: 10, padding: "8px 16px", borderRadius: 8,
                        border: `1px dashed ${t.accent}40`, background: "transparent",
                        color: t.accent, fontSize: fs(12), cursor: "pointer",
                        fontFamily: "inherit",
                      }}>
                      Actually worked out? Log it
                    </button>
                  </div>
                );
              }

              // Today or future — check if there's already logged exercise data
              let preDone = 0;
              const preExercises = !isFutureDate ? (WORKOUT_DATA[week]?.[day]?.exercises || []) : [];
              const preTotal = preExercises.length;
              if (!isFutureDate) {
                preExercises.forEach(ex => {
                  const dn = displayName(ex.name);
                  let allDone = ex.sets > 0;
                  for (let si = 0; si < ex.sets; si++) {
                    if (!logData[`${selectedDate}-${dn}-${si}`]?.done) { allDone = false; break; }
                  }
                  if (allDone) preDone++;
                });
              }
              const prePct = preTotal > 0 ? Math.round((preDone / preTotal) * 100) : 0;
              const hasProgress = preDone > 0;

              return (
                <div style={{ marginBottom: 14 }}>
                  <button onClick={isFutureDate ? null : startSession}
                    style={{
                      width: "100%", padding: "14px", borderRadius: 14,
                      border: `2px dashed ${t.accent}40`, background: hasProgress ? t.success + "10" : t.accentGlow,
                      color: hasProgress ? t.success : t.accent, fontSize: fs(14), fontWeight: 600,
                      cursor: isFutureDate ? "default" : "pointer",
                      fontFamily: "inherit", display: "flex", alignItems: "center",
                      justifyContent: "center", gap: 8,
                      borderColor: hasProgress ? t.success + "40" : t.accent + "40",
                    }}>
                    {isFutureDate
                      ? `Upcoming — W${week} D${day} (${dayData?.label})`
                      : hasProgress
                        ? `▶ Resume Workout — ${prePct}% (${preDone}/${preTotal})`
                        : `▶ Start Workout — W${week} D${day} (${dayData?.label})`
                    }
                  </button>
                  {hasProgress && !isFutureDate && (
                    <div style={{
                      marginTop: 6, height: 4, borderRadius: 2,
                      background: t.border, overflow: "hidden",
                    }}>
                      <div style={{
                        height: "100%", borderRadius: 2,
                        width: `${prePct}%`, background: t.success,
                      }} />
                    </div>
                  )}
                </div>
              );
            })()}
            {/* Week & Day Selector */}
            <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
              <button onClick={() => setShowWeekPicker(!showWeekPicker)}
                style={{
                  flex: 1, padding: "10px 14px", borderRadius: 12, border: `1px solid ${t.border}`,
                  background: t.card, color: t.text, fontSize: fs(14), fontFamily: "inherit",
                  cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between",
                }}
              >
                <span style={{ fontWeight: 600 }}>Week {week}</span>
                <span style={{ fontSize: fs(10), color: t.textDim }}>▼</span>
              </button>
            </div>

            {showWeekPicker && (
              <div style={{
                background: t.card, border: `1px solid ${t.border}`, borderRadius: 14,
                padding: 10, marginBottom: 12, display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6,
              }}>
                {Array.from({ length: 12 }, (_, i) => i + 1).map(w => (
                  <button key={w} onClick={() => {
                      setWeek(w); setShowWeekPicker(false);
                      if (selectedDate === todayStr) {
                        setNextWorkoutPos({ week: w, day });
                      }
                      if (selectedSession) {
                        setSessionLog(prev => ({ ...prev, [selectedDate]: { ...prev[selectedDate], week: w } }));
                      }
                    }}
                    style={{
                      padding: "8px 0", borderRadius: 8, border: "none", cursor: "pointer",
                      background: week === w ? t.accent : t.cardAlt,
                      color: week === w ? "#fff" : t.textDim, fontSize: fs(13), fontWeight: 600,
                      fontFamily: "inherit",
                    }}
                  >{w}</button>
                ))}
              </div>
            )}

            {/* Day Pills */}
            <div style={{ display: "flex", gap: 6, marginBottom: 16, overflowX: "auto" }}>
              {[1, 2, 3, 4, 5, 6].map(d => {
                const dl = weekData?.[d]?.label || "";
                const short = dl.replace("LEGS", "LEG").replace("TORSO", "TOR").replace("ARMS", "ARM").replace(" (DELOAD)", "");
                return (
                  <button key={d} onClick={() => {
                      setDay(d); setExpandedEx(null);
                      if (selectedDate === todayStr) {
                        setNextWorkoutPos({ week, day: d });
                      }
                      // Update session if one exists (active or completed)
                      if (selectedSession) {
                        setSessionLog(prev => ({ ...prev, [selectedDate]: { ...prev[selectedDate], day: d } }));
                      }
                    }}
                    style={{
                      padding: "8px 12px", borderRadius: 10, border: day === d ? "none" : `1px solid ${t.border}`,
                      background: day === d ? t.gradient : t.card,
                      color: day === d ? "#fff" : t.textDim, fontSize: fs(11), fontWeight: 600,
                      cursor: "pointer", whiteSpace: "nowrap", fontFamily: "'DM Mono', monospace",
                      letterSpacing: 0.5, flexShrink: 0,
                    }}
                  >
                    D{d} {short}
                  </button>
                );
              })}
            </div>

            {/* Day Header */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: fs(20), fontWeight: 700 }}>Day {day}</div>
              <div style={{ fontSize: fs(14), color: t.accent, fontWeight: 500 }}>{dayData?.label}</div>
            </div>

            {/* Exercise List */}
            {exercises.map((ex, idx) => {
              const isExpanded = expandedEx === idx;
              const currentDisplay = displayName(ex.name);
              const isSwapped = currentDisplay !== ex.name;
              const isBW = currentDisplay.startsWith("BW:");
              const isTimedEx = isBW && /hold|plank|l-sit|wall sit|iso/i.test(currentDisplay);
              const prevResult = getPrevWeekResult(currentDisplay);
              const history = getExerciseHistory(currentDisplay);
              // Check if all sets of this exercise are done
              let exAllDone = ex.sets > 0;
              for (let si = 0; si < ex.sets; si++) {
                if (!logData[`${selectedDate}-${currentDisplay}-${si}`]?.done) { exAllDone = false; break; }
              }

              return (
                <div key={idx} style={{
                  background: t.card, borderRadius: 14, marginBottom: 8,
                  border: `1px solid ${isExpanded ? t.accent + "40" : exAllDone ? t.success + "40" : t.border}`,
                  overflow: "hidden", transition: "border-color 0.2s",
                }}>
                  {/* Exercise Row */}
                  <button
                    onClick={() => setExpandedEx(isExpanded ? null : idx)}
                    style={{
                      width: "100%", padding: "14px 16px", border: "none",
                      background: "transparent", cursor: "pointer", display: "flex",
                      alignItems: "center", gap: 12, color: t.text, fontFamily: "inherit",
                    }}
                  >
                    <div style={{
                      width: 32, height: 32, borderRadius: 8,
                      background: exAllDone ? t.success : t.accentGlow,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: exAllDone ? fs(14) : fs(12), fontWeight: 700,
                      color: exAllDone ? "#fff" : t.accent, flexShrink: 0,
                      fontFamily: "'DM Mono', monospace",
                    }}>
                      {exAllDone ? "✓" : idx + 1}
                    </div>
                    <div style={{ flex: 1, textAlign: "left" }}>
                      <div style={{ fontSize: fs(14), fontWeight: 500, lineHeight: 1.3 }}>
                        {isSwapped && <span style={{ color: t.warning, fontSize: fs(10), marginRight: 4 }}>⇄</span>}
                        {isBW && <span style={{
                          fontSize: fs(9), fontWeight: 700, color: t.accent, background: t.accentGlow,
                          padding: "1px 5px", borderRadius: 4, marginRight: 4, verticalAlign: "middle",
                          fontFamily: "'DM Mono', monospace",
                        }}>BW</span>}
                        {currentDisplay.replace(/^BW:\s*/, "")}
                      </div>
                      <div style={{ fontSize: fs(12), color: t.textDim, marginTop: 2, fontFamily: "'DM Mono', monospace" }}>
                        {(() => {
                          // Check if any sets are logged for this exercise today
                          const loggedSets = [];
                          for (let si = 0; si < ex.sets; si++) {
                            const lk = `${selectedDate}-${currentDisplay}-${si}`;
                            const lv = logData[lk];
                            if (lv?.done && (lv.weight || lv.reps)) {
                              loggedSets.push(lv);
                            }
                          }
                          if (loggedSets.length > 0) {
                            // Show actual logged data
                            const summary = loggedSets.map((s, i) =>
                              isBW
                                ? `${s.reps || "?"}${isTimedEx ? "s" : ""}`
                                : `${s.weight || 0}×${s.reps || "?"}`
                            ).join(", ");
                            return <span style={{ color: t.success }}>{summary}{isBW && loggedSets[0]?.weight ? ` (+${loggedSets[0].weight})` : !isBW ? " lbs" : ""}</span>;
                          }
                          // Show prescribed reps
                          return (
                            <>
                              {ex.sets}×{ex.reps}{isTimedEx ? "s" : ""}
                              {!isBW && ex.result && <span style={{ color: t.accent, marginLeft: 8 }}>{ex.result} lbs</span>}
                              {!ex.result && prevResult && <span style={{ color: t.textMuted, marginLeft: 8 }}>prev: {prevResult}</span>}
                            </>
                          );
                        })()}
                      </div>
                    </div>
                    <span style={{ fontSize: fs(12), color: t.textDim, transform: isExpanded ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▼</span>
                  </button>

                  {/* Expanded Detail */}
                  {isExpanded && (
                    <div style={{ padding: "0 16px 16px", borderTop: `1px solid ${t.border}` }}>
                      {/* Notes */}
                      {ex.notes && (
                        <div style={{
                          margin: "12px 0 10px", padding: "8px 12px", borderRadius: 8,
                          background: t.accentGlow, fontSize: fs(12), color: t.accent,
                          fontStyle: "italic",
                        }}>
                          {ex.notes}
                        </div>
                      )}

                      {/* Previous week */}
                      {prevResult && (
                        <div style={{ fontSize: fs(12), color: t.textDim, marginTop: 10, marginBottom: 6 }}>
                          Last: <span style={{ color: t.text, fontWeight: 600 }}>{prevResult}</span>
                        </div>
                      )}

                      {/* Set Logging */}
                      <div style={{ marginTop: 10 }}>
                        <div style={{ fontSize: fs(11), color: t.textDim, marginBottom: 8, textTransform: "uppercase", letterSpacing: 1, fontFamily: "'DM Mono', monospace" }}>Log Sets</div>
                        {Array.from({ length: ex.sets }, (_, si) => {
                          const logKey = `${selectedDate}-${currentDisplay}-${si}`;
                          const val = logData[logKey] || {};
                          return (
                            <div key={si} style={{
                              display: "flex", gap: 8, marginBottom: 6, alignItems: "center",
                            }}>
                              <span style={{
                                width: 24, fontSize: fs(11), color: t.textDim, fontFamily: "'DM Mono', monospace",
                              }}>S{si + 1}</span>
                              <input
                                type="number" placeholder={isBW ? "+lbs" : "Weight"}
                                value={val.weight || ""}
                                onChange={e => {
                                  const v = e.target.value;
                                  setLogData(prev => {
                                    const cur = prev[logKey] || {};
                                    const next = { ...prev, [logKey]: { ...cur, weight: v } };
                                    if (!cur.done && cur.reps && (v || isBW)) {
                                      next[logKey] = { ...next[logKey], done: true, completedAt: new Date().toISOString(), date: selectedDate };
                                      // Auto-check Workout habit at 50%+ exercise completion
                                      let tEx = exercises.length, dEx = 0;
                                      exercises.forEach(e2 => {
                                        const dn2 = displayName(e2.name);
                                        let ad = e2.sets > 0;
                                        for (let s2 = 0; s2 < e2.sets; s2++) { if (!next[`${selectedDate}-${dn2}-${s2}`]?.done) { ad = false; break; } }
                                        if (ad) dEx++;
                                      });
                                      if (tEx > 0 && (dEx / tEx) >= 0.5) toggleHabit(3, true);
                                    }
                                    return next;
                                  });
                                }}
                                style={{
                                  flex: 1, padding: "8px 10px", borderRadius: 8,
                                  border: `1px solid ${t.border}`, background: t.cardAlt,
                                  color: t.text, fontSize: fs(14), fontFamily: "'DM Mono', monospace",
                                  outline: "none",
                                }}
                              />
                              <input
                                type="number" placeholder={isTimedEx ? "Secs" : "Reps"}
                                value={val.reps || ""}
                                onChange={e => {
                                  const v = e.target.value;
                                  setLogData(prev => {
                                    const cur = prev[logKey] || {};
                                    const next = { ...prev, [logKey]: { ...cur, reps: v } };
                                    if (!cur.done && v && (cur.weight || isBW)) {
                                      next[logKey] = { ...next[logKey], done: true, completedAt: new Date().toISOString(), date: selectedDate };
                                      // Auto-check Workout habit at 50%+ exercise completion
                                      let tEx = exercises.length, dEx = 0;
                                      exercises.forEach(e2 => {
                                        const dn2 = displayName(e2.name);
                                        let ad = e2.sets > 0;
                                        for (let s2 = 0; s2 < e2.sets; s2++) { if (!next[`${selectedDate}-${dn2}-${s2}`]?.done) { ad = false; break; } }
                                        if (ad) dEx++;
                                      });
                                      if (tEx > 0 && (dEx / tEx) >= 0.5) toggleHabit(3, true);
                                    }
                                    return next;
                                  });
                                }}
                                style={{
                                  width: 70, padding: "8px 10px", borderRadius: 8,
                                  border: `1px solid ${t.border}`, background: t.cardAlt,
                                  color: t.text, fontSize: fs(14), fontFamily: "'DM Mono', monospace",
                                  outline: "none",
                                }}
                              />
                              <button
                                onClick={() => {
                                  const now = new Date().toISOString();
                                  const willBeDone = !logData[logKey]?.done;
                                  setLogData(prev => {
                                    const next = { ...prev, [logKey]: { ...prev[logKey], done: willBeDone, completedAt: willBeDone ? now : null, date: selectedDate } };
                                    // Auto-check Workout habit at 50%+ exercise completion
                                    if (willBeDone && (selectedSession?.status === "active" || selectedDate === todayStr)) {
                                      let totalEx = exercises.length, doneEx = 0;
                                      exercises.forEach(e => {
                                        const dn = displayName(e.name);
                                        let allDone = e.sets > 0;
                                        for (let s = 0; s < e.sets; s++) {
                                          if (!next[`${selectedDate}-${dn}-${s}`]?.done) { allDone = false; break; }
                                        }
                                        if (allDone) doneEx++;
                                      });
                                      if (totalEx > 0 && (doneEx / totalEx) >= 0.5) toggleHabit(3, true);
                                    }
                                    return next;
                                  });
                                }}
                                style={{
                                  width: 32, height: 32, borderRadius: 8, border: "none",
                                  background: logData[logKey]?.done ? t.success : t.cardAlt,
                                  color: logData[logKey]?.done ? "#fff" : t.textMuted,
                                  cursor: "pointer", fontSize: fs(14), display: "flex",
                                  alignItems: "center", justifyContent: "center",
                                }}
                              >✓</button>
                            </div>
                          );
                        })}
                      </div>

                      {/* Progress Mini Chart */}
                      {history.length >= 2 && (
                        <div style={{ marginTop: 14 }}>
                          <MiniChart data={history.map(h => h.result)} color={t.accent} label={isBW ? (isTimedEx ? "Duration Progress" : "Rep Progress") : "Weight Progress (lbs)"} />
                        </div>
                      )}

                      {/* Swap Exercise Button */}
                      <button
                        onClick={() => setShowAlts(showAlts === idx ? null : idx)}
                        style={{
                          marginTop: 12, width: "100%", padding: "10px", borderRadius: 10,
                          border: `1px dashed ${t.border}`, background: "transparent",
                          color: t.textDim, fontSize: fs(13), cursor: "pointer", fontFamily: "inherit",
                          display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                        }}
                      >
                        ⇄ {showAlts === idx ? "Hide Alternatives" : "Swap Exercise"}
                      </button>

                      {/* Alternatives Panel */}
                      {showAlts === idx && (
                        <div style={{ marginTop: 8 }}>
                          {(ALTERNATIVES[ex.name] || []).map((alt, ai) => (
                            <button key={ai} onClick={() => swapExercise(ex.name, alt)}
                              style={{
                                display: "block", width: "100%", padding: "10px 12px",
                                marginBottom: 4, borderRadius: 8, border: `1px solid ${t.border}`,
                                background: t.cardAlt, color: t.text, fontSize: fs(13),
                                cursor: "pointer", textAlign: "left", fontFamily: "inherit",
                              }}
                            >{alt}</button>
                          ))}
                          <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                            <input
                              type="text" placeholder="Custom exercise..."
                              value={customAlt}
                              onChange={e => setCustomAlt(e.target.value)}
                              style={{
                                flex: 1, padding: "8px 10px", borderRadius: 8,
                                border: `1px solid ${t.border}`, background: t.cardAlt,
                                color: t.text, fontSize: fs(13), fontFamily: "inherit", outline: "none",
                              }}
                            />
                            <button
                              onClick={() => { if (customAlt.trim()) { swapExercise(ex.name, customAlt.trim()); setCustomAlt(""); } }}
                              style={{
                                padding: "8px 14px", borderRadius: 8, border: "none",
                                background: t.gradient, color: "#fff", fontSize: fs(13),
                                fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                              }}
                            >Add</button>
                          </div>
                          {isSwapped && (
                            <button
                              onClick={() => { const key = `${week}-${day}-${ex.name}`; setSwappedExercises(prev => { const n = { ...prev }; delete n[key]; return n; }); setShowAlts(null); }}
                              style={{
                                marginTop: 6, width: "100%", padding: "8px", borderRadius: 8,
                                border: "none", background: t.warning + "20", color: t.warning,
                                fontSize: fs(12), cursor: "pointer", fontFamily: "inherit",
                              }}
                            >↩ Revert to {ex.name}</button>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ═══ HABITS TAB ═══ */}
        {tab === "habits" && (
          <div style={{ padding: "16px 16px 0" }}>
            
            {/* ── Daily Weight Logger ── */}
            <div style={{
              background: t.card, borderRadius: 16, padding: 16, marginBottom: 12,
              border: `1px solid ${selectedWeight ? t.success + "40" : t.accent + "40"}`,
              transition: "all 0.3s", overflow: "hidden",
            }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: fs(20) }}>⚖️</span>
                  <div>
                    <div style={{ fontSize: fs(14), fontWeight: 600 }}>Daily Weigh-In</div>
                    <div style={{ fontSize: fs(11), color: t.textDim, fontFamily: "'DM Mono', monospace" }}>
                      {selectedDateLabel}
                    </div>
                  </div>
                </div>
                {selectedWeight && (
                  <div style={{
                    padding: "4px 10px", borderRadius: 20, background: t.success + "20",
                    color: t.success, fontSize: fs(11), fontWeight: 600, fontFamily: "'DM Mono', monospace",
                    display: "flex", alignItems: "center", gap: 4,
                    animation: weightLogAnim ? "pulse 0.5s ease" : "none",
                  }}>
                    ✓ Logged
                  </div>
                )}
              </div>

              {/* Current weight display */}
              {selectedWeight ? (
                <div style={{ textAlign: "center", marginBottom: 12 }}>
                  <div style={{
                    fontSize: fs(42), fontWeight: 700, fontFamily: "'DM Mono', monospace",
                    background: t.gradient, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
                    lineHeight: 1.1,
                    animation: weightLogAnim ? "pulse 0.5s ease" : "none",
                  }}>
                    {selectedWeight}
                  </div>
                  <div style={{ fontSize: fs(13), color: t.textDim }}>lbs</div>
                  {weightChange !== null && (
                    <div style={{
                      fontSize: fs(13), fontWeight: 600, marginTop: 4,
                      color: weightChange > 0 ? t.success : weightChange < 0 ? t.danger : t.textDim,
                      fontFamily: "'DM Mono', monospace",
                    }}>
                      {weightChange > 0 ? "+" : ""}{weightChange.toFixed(1)} from previous
                    </div>
                  )}
                  {totalChange !== null && (
                    <div style={{ fontSize: fs(11), color: t.textDim, marginTop: 2 }}>
                      {totalChange > 0 ? "+" : ""}{totalChange.toFixed(1)} lbs total ({sortedWeights.length} days tracked)
                    </div>
                  )}
                </div>
              ) : (
                <div style={{ textAlign: "center", padding: "8px 0 12px" }}>
                  <div style={{ fontSize: fs(14), color: t.textDim, marginBottom: 8 }}>
                    {prevWeightEntry ? `Previous: ${prevWeightEntry.weight} lbs` : "No previous entry"}
                  </div>
                </div>
              )}

              {/* Weight Input Controls */}
              <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                <button onClick={() => adjustWeight(-0.5)}
                  style={{
                    width: 40, height: 44, borderRadius: 12, border: `1px solid ${t.border}`,
                    background: t.cardAlt, color: t.text, fontSize: fs(16), fontWeight: 600,
                    cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                    fontFamily: "'DM Mono', monospace", flexShrink: 0,
                  }}>−</button>
                <button onClick={() => adjustWeight(-0.1)}
                  style={{
                    width: 34, height: 44, borderRadius: 10, border: `1px solid ${t.border}`,
                    background: t.cardAlt, color: t.textDim, fontSize: fs(10), fontWeight: 500,
                    cursor: "pointer", fontFamily: "'DM Mono', monospace", flexShrink: 0,
                  }}>−.1</button>
                <input
                  type="text"
                  inputMode="decimal"
                  placeholder={prevWeightEntry ? String(prevWeightEntry.weight) : "160.0"}
                  value={weightInput}
                  onChange={e => {
                    const raw = e.target.value.replace(/[^0-9.]/g, "");
                    setWeightInput(raw);
                  }}
                  onBlur={commitWeightInput}
                  onKeyDown={e => { if (e.key === "Enter") { e.target.blur(); } }}
                  style={{
                    flex: 1, minWidth: 0, padding: "10px 4px", borderRadius: 12, textAlign: "center",
                    border: `2px solid ${selectedWeight ? t.success + "60" : t.accent + "40"}`,
                    background: t.cardAlt, color: t.text, fontSize: fs(18), fontWeight: 700,
                    fontFamily: "'DM Mono', monospace", outline: "none",
                    transition: "border-color 0.3s", boxSizing: "border-box",
                  }}
                />
                <button onClick={() => adjustWeight(0.1)}
                  style={{
                    width: 34, height: 44, borderRadius: 10, border: `1px solid ${t.border}`,
                    background: t.cardAlt, color: t.textDim, fontSize: fs(10), fontWeight: 500,
                    cursor: "pointer", fontFamily: "'DM Mono', monospace", flexShrink: 0,
                  }}>+.1</button>
                <button onClick={() => adjustWeight(0.5)}
                  style={{
                    width: 40, height: 44, borderRadius: 12, border: `1px solid ${t.border}`,
                    background: t.cardAlt, color: t.text, fontSize: fs(16), fontWeight: 600,
                    cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                    fontFamily: "'DM Mono', monospace", flexShrink: 0,
                  }}>+</button>
              </div>

              {/* Quick set buttons */}
              {!selectedWeight && prevWeightEntry && (
                <button onClick={() => logWeight(prevWeightEntry.weight)}
                  style={{
                    width: "100%", marginTop: 8, padding: "10px", borderRadius: 10,
                    border: `1px dashed ${t.border}`, background: "transparent",
                    color: t.textDim, fontSize: fs(13), cursor: "pointer", fontFamily: "inherit",
                  }}>
                  Same as last ({prevWeightEntry.weight} lbs)
                </button>
              )}

              {/* Mini weight trend */}
              {last7Weights.length >= 2 && (
                <div style={{ marginTop: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <span style={{ fontSize: fs(10), color: t.textDim, fontFamily: "'DM Mono', monospace" }}>LAST {last7Weights.length} ENTRIES</span>
                    <span style={{ fontSize: fs(10), color: t.textDim }}>
                      {last7Weights[0].date.split("-").slice(1).join("/")} → {last7Weights[last7Weights.length-1].date.split("-").slice(1).join("/")}
                    </span>
                  </div>
                  <div style={{ display: "flex", gap: 3, alignItems: "flex-end", height: 32 }}>
                    {last7Weights.map((entry, i) => {
                      const min = Math.min(...last7Weights.map(e => e.weight));
                      const max = Math.max(...last7Weights.map(e => e.weight));
                      const range = max - min || 1;
                      const pct = ((entry.weight - min) / range) * 70 + 30;
                      const isToday = entry.date === selectedDate;
                      return (
                        <div key={i} style={{
                          flex: 1, borderRadius: 3,
                          height: `${pct}%`,
                          background: isToday ? t.accent : t.accent + "40",
                          position: "relative",
                        }}>
                          {isToday && (
                            <div style={{
                              position: "absolute", top: -14, left: "50%", transform: "translateX(-50%)",
                              fontSize: fs(8), color: t.accent, fontWeight: 700, whiteSpace: "nowrap",
                            }}>▼</div>
                          )}
                        </div>
                      );
                    })}

                <div style={{
                  textAlign: "center", padding: "20px 0",
                }}>
                  <div style={{ fontSize: fs(32), marginBottom: 8 }}>✓</div>
                  <div style={{ fontSize: fs(14), fontWeight: 600, color: t.success }}>Feedback Saved</div>
                  <div style={{ fontSize: fs(12), color: t.textDim, marginTop: 4 }}>Your report has been saved locally.</div>
                  <button
                    onClick={() => setFeedbackSent(false)}
                    style={{
                      marginTop: 12, padding: "8px 20px", borderRadius: 8,
                      border: `1px solid ${t.border}`, background: "transparent",
                      color: t.textDim, fontSize: fs(12), cursor: "pointer", fontFamily: "inherit",
                    }}
                  >Submit Another</button>
                </div>
              ) : (
                <>
                  <textarea
                    placeholder={"Describe the issue or suggestion...\n\nInclude:\n• What happened\n• What you expected\n• Which tab/screen it occurred on"}
                    value={feedbackText}
                    onChange={e => setFeedbackText(e.target.value)}
                    rows={5}
                    style={{
                      width: "100%", padding: "12px", borderRadius: 10,
                      border: `1px solid ${t.border}`, background: t.cardAlt,
                      color: t.text, fontSize: fs(13), fontFamily: "inherit",
                      resize: "vertical", outline: "none", lineHeight: 1.5,
                      boxSizing: "border-box",
                    }}
                  />
                  <button
                    onClick={() => {
                      if (feedbackText.trim()) {
                        const existing = loadState("feedbackLog", []);
                        existing.push({
                          date: new Date().toISOString(),
                          text: feedbackText.trim(),
                          theme,
                          selectedDate,
                        });
                        saveState("feedbackLog", existing);
                        setFeedbackText("");
                        setFeedbackSent(true);
                      }
                    }}
                    style={{
                      width: "100%", marginTop: 8, padding: "12px", borderRadius: 10,
                      border: "none", background: feedbackText.trim() ? t.gradient : t.cardAlt,
                      color: feedbackText.trim() ? "#fff" : t.textMuted,
                      fontSize: fs(14), fontWeight: 600, cursor: feedbackText.trim() ? "pointer" : "default",
                      fontFamily: "inherit",
                    }}
                  >
                    Submit Feedback
                  </button>
                </>
              )}
            </div>

            {/* ── App Version ── */}
            <div style={{
              textAlign: "center", padding: "16px 0 8px",
              fontSize: fs(11), color: t.textMuted, fontFamily: "'DM Mono', monospace",
            }}>
              Superhuman 90 · v2.2
            </div>
          </div>
        )}
      </div>

      {/* ── Bottom Navigation ── */}
      <div style={{
        position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
        width: "100%", maxWidth: 430, padding: "16px 16px 20px",
        background: `linear-gradient(transparent, ${t.bg} 30%)`, zIndex: 50,
      }}>
        <div style={{
          display: "flex", background: t.card, borderRadius: 16,
          border: `1px solid ${t.border}`, padding: 4,
        }}>
          {[
            { id: "habits", label: "Habits", icon: "✅" },
            { id: "workout", label: "Workout", icon: "🏋️" },
            { id: "progress", label: "Progress", icon: "📊" },
            { id: "profile", label: "Me", icon: "👤" },
          ].map(({ id, label, icon }) => (
            <button key={id} onClick={() => setTab(id)}
              style={{
                flex: 1, padding: "10px 0", borderRadius: 12, border: "none",
                background: tab === id ? t.gradient : "transparent",
                color: tab === id ? "#fff" : t.textDim,
                cursor: "pointer", fontSize: Math.min(fs(11), 15), fontWeight: 600, fontFamily: "inherit",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
                minWidth: 0, overflow: "hidden",
              }}
            >
              <span style={{ fontSize: fs(16) }}>{icon}</span>
              {label}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}


    // Render app — waits for cloud restore if localStorage is empty
    function doRender() {
      ReactDOM.createRoot(document.getElementById("root")).render(<SuperhumanApp />);
    }
    if (window.__sh90_ready) {
      doRender();
    } else {
      window.__sh90_renderApp = doRender;
    }

  </script>
  <script>
    // ── App version for cache busting ──
    var APP_VERSION = 'v2.2';

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(function(reg) {
        reg.update();
        reg.addEventListener('updatefound', function() {
          var newWorker = reg.installing;
          if (newWorker) {
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'activated') {
                window.location.reload();
              }
            });
          }
        });
      });
    }

    // ── iOS PWA force-update check ──
    // On every launch, fetch a tiny version file. If it differs from
    // the baked-in APP_VERSION, nuke the caches and hard-reload.
    (function() {
      if (!navigator.standalone && !window.matchMedia('(display-mode: standalone)').matches) return;
      fetch('./version.txt?t=' + Date.now(), { cache: 'no-store' })
        .then(function(r) { return r.text(); })
        .then(function(remote) {
          if (remote.trim() !== APP_VERSION) {
            // Clear all caches
            if ('caches' in window) {
              caches.keys().then(function(keys) {
                return Promise.all(keys.map(function(k) { return caches.delete(k); }));
              }).then(function() {
                window.location.reload();
              });
            } else {
              window.location.reload();
            }
          }
        })
        .catch(function() {});
    })();
  </script>
