  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; }
    body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    textarea { font-family: 'DM Sans', sans-serif; }

  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js" integrity="sha384-pKNXKj7jF9BNMkQyGWg5YLfoPyqBa/gf7wjTSoTGQlwxbZB+sabJuKyOHR6JQvTd" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Local date helper (timezone-safe) ──
    const toLocalDateStr = (d) => {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    };

    // ── localStorage helpers ──
    const sanitizeString = (val, maxLen = 500) =>
      typeof val === "string" ? val.slice(0, maxLen) : "";
    const sanitizeNumber = (val, min = 0, max = 9999) => {
      const n = Number(val);
      return Number.isFinite(n) ? Math.min(Math.max(n, min), max) : min;
    };
    const loadState = (key, fallback) => {
      try {
        const saved = localStorage.getItem("sh90_" + key);
        if (!saved) return fallback;
        const parsed = JSON.parse(saved);
        if (fallback !== null && typeof parsed !== typeof fallback) return fallback;
        if (Array.isArray(fallback) && !Array.isArray(parsed)) return fallback;
        return parsed;
      } catch { return fallback; }
    };
    const loadProfile = () => {
      const raw = loadState("profile", { name: "", age: "", height: "", goalWeight: "", notes: "" });
      return {
        name: sanitizeString(raw.name, 100),
        age: sanitizeString(raw.age, 3),
        height: sanitizeString(raw.height, 10),
        goalWeight: sanitizeString(raw.goalWeight, 10),
        notes: sanitizeString(raw.notes, 1000),
      };
    };
    const saveState = (key, value) => {
      try { localStorage.setItem("sh90_" + key, JSON.stringify(value)); } catch {}
    };

    // ── Supabase Setup ──
    const SUPABASE_URL = "https://xwhotgkmlbqcyjpdhlbt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3aG90Z2ttbGJxY3lqcGRobGJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjA5NTksImV4cCI6MjA4NzYzNjk1OX0.VI7sMUCh-IxSCSEouagYNBBIuQExbhF7uePSO0oNuXc";
    const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

    // Device ID: persistent anonymous identifier
    const DEFAULT_DEVICE = "aaae86fd-3725-4650-9fbd-2fc8d55efd41";
    const getDeviceId = () => {
      var params = new URLSearchParams(window.location.search);
      var urlDevice = params.get("device");
      if (urlDevice) {
        localStorage.setItem("sh90_device_id", urlDevice);
        window.history.replaceState({}, "", window.location.pathname);
        return urlDevice;
      }
      let id = localStorage.getItem("sh90_device_id");
      if (!id) {
        id = DEFAULT_DEVICE;
        localStorage.setItem("sh90_device_id", id);
      }
      return id;
    };
    const DEVICE_ID = getDeviceId();

    // Register device in Supabase (fire-and-forget)
    const registerDevice = async () => {
      if (!supabase) return;
      try {
        await supabase.from("devices").upsert({ device_id: DEVICE_ID }, { onConflict: "device_id" });
      } catch (e) { console.warn("Device registration failed:", e); }
    };
    registerDevice();

    // ── Supabase Sync Helpers ──
    const syncToSupabase = async (table, data, conflictCols) => {
      if (!supabase) return;
      try {
        await supabase.from(table).upsert(data, { onConflict: conflictCols });
      } catch (e) { console.warn("Sync failed for " + table + ":", e); }
    };

    const loadFromSupabase = async (table, filters) => {
      if (!supabase) return null;
      try {
        let query = supabase.from(table).select("*").eq("device_id", DEVICE_ID);
        if (filters) {
          Object.entries(filters).forEach(function(entry) {
            query = query.eq(entry[0], entry[1]);
          });
        }
        const { data, error } = await query;
        if (error) throw error;
        return data;
      } catch (e) { console.warn("Load failed for " + table + ":", e); return null; }
    };

    // Sync profile to Supabase
    const syncProfile = async (profileData, opts) => {
      if (!supabase) return;
      var row = {
        device_id: DEVICE_ID,
        name: profileData.name || "",
        age: profileData.age || "",
        height: profileData.height || "",
        goal_weight: profileData.goalWeight || "",
        notes: profileData.notes || "",
        updated_at: new Date().toISOString(),
      };
      if (opts) {
        if (opts.theme !== undefined) row.theme = opts.theme;
        if (opts.textSize !== undefined) row.text_size = opts.textSize;
        if (opts.workoutMode !== undefined) row.workout_mode = opts.workoutMode;
        if (opts.calorieGoal !== undefined) row.calorie_goal = opts.calorieGoal;
        if (opts.nextWorkoutWeek !== undefined) row.next_workout_week = opts.nextWorkoutWeek;
        if (opts.nextWorkoutDay !== undefined) row.next_workout_day = opts.nextWorkoutDay;
      }
      syncToSupabase("profiles", row, "device_id");
    };

    // Sync exercise log entry
    const syncExerciseLog = async (date, exerciseName, setIndex, entry) => {
      if (!supabase) return;
      syncToSupabase("exercise_logs", {
        device_id: DEVICE_ID,
        date: date,
        exercise_name: exerciseName,
        set_index: setIndex,
        weight: entry.weight || null,
        reps: entry.reps || null,
        done: !!entry.done,
        completed_at: entry.done ? new Date().toISOString() : null,
        updated_at: new Date().toISOString(),
      }, "device_id,date,exercise_name,set_index");
    };

    // Sync session
    const syncSession = async (date, session) => {
      if (!supabase) return;
      syncToSupabase("sessions", {
        device_id: DEVICE_ID,
        date: date,
        week: session.week || 1,
        day: session.day || 1,
        status: session.status || "active",
        started_at: session.startedAt || null,
        completed_at: session.completedAt || null,
        updated_at: new Date().toISOString(),
      }, "device_id,date");
    };

    // Sync weight
    const syncWeight = async (date, weight) => {
      if (!supabase) return;
      syncToSupabase("weight_log", {
        device_id: DEVICE_ID,
        date: date,
        weight: weight,
      }, "device_id,date");
    };

    // Sync habits
    const syncHabits = async (date, habits) => {
      if (!supabase) return;
      var row = { device_id: DEVICE_ID, date: date, updated_at: new Date().toISOString() };
      for (var i = 0; i < 8; i++) { row["h" + i] = !!(habits && habits[i]); }
      syncToSupabase("habit_log", row, "device_id,date");
    };

    // Sync habit note
    const syncHabitNote = async (date, habitIndex, note) => {
      if (!supabase) return;
      syncToSupabase("habit_notes", {
        device_id: DEVICE_ID,
        date: date,
        habit_index: habitIndex,
        note: note || "",
        updated_at: new Date().toISOString(),
      }, "device_id,date,habit_index");
    };

    // Sync steps
    const syncSteps = async (date, steps) => {
      if (!supabase) return;
      syncToSupabase("step_log", {
        device_id: DEVICE_ID,
        date: date,
        steps: steps,
      }, "device_id,date");
    };

    // Sync food entry
    const syncFoodEntry = async (entry, date) => {
      if (!supabase) return;
      syncToSupabase("food_entries", {
        device_id: DEVICE_ID,
        date: date,
        entry_id: entry.id,
        food_text: entry.text || "",
        category: entry.category || "",
        logged_at: entry.time || null,
        items: JSON.stringify(entry.items || []),
        calories: entry.cal || 0,
        protein: entry.protein || 0,
        carbs: entry.carbs || 0,
        fat: entry.fat || 0,
      }, "device_id,entry_id");
    };

    // Sync exercise swap
    const syncExerciseSwap = async (week, day, original, swapped) => {
      if (!supabase) return;
      syncToSupabase("exercise_swaps", {
        device_id: DEVICE_ID,
        week: week,
        day: day,
        original_exercise: original,
        swapped_exercise: swapped,
      }, "device_id,week,day,original_exercise");
    };

    // Sync workout selection
    const syncWorkoutSelection = async (date, sel) => {
      if (!supabase) return;
      syncToSupabase("workout_selection", {
        device_id: DEVICE_ID,
        date: date,
        day: sel.day,
        label: sel.label,
      }, "device_id,date");
    };

    // ── Full Migration: push all localStorage data to Supabase ──
    const migrateToSupabase = async () => {
      if (!supabase) return;
      try {
        // Check if device already exists
        var existing = await supabase.from("devices").select("device_id").eq("device_id", DEVICE_ID).single();
        if (existing.data) {
          console.log("SH90: Device already registered, skipping migration");
          return;
        }
      } catch (e) { /* device not found, proceed with migration */ }

      console.log("SH90: Migrating localStorage to Supabase...");

      // Register device
      await registerDevice();

      // Migrate profile
      var profile = loadProfile();
      var theme = loadState("theme", "arctic");
      var textSize = loadState("textSize", "medium");
      var workoutMode = loadState("workoutMode", "gym");
      var calorieGoal = loadState("calorieGoal", 2000);
      var nextPos = loadState("nextWorkoutPos", null);
      syncProfile(profile, {
        theme: theme,
        textSize: textSize,
        workoutMode: workoutMode,
        calorieGoal: calorieGoal,
        nextWorkoutWeek: nextPos ? nextPos.week : 1,
        nextWorkoutDay: nextPos ? nextPos.day : 1,
      });

      // Migrate sessions
      var sessionLog = loadState("sessionLog", {});
      Object.entries(sessionLog).forEach(function(entry) {
        syncSession(entry[0], entry[1]);
      });

      // Migrate weight log
      var weightLog = loadState("weightLog", {});
      Object.entries(weightLog).forEach(function(entry) {
        if (entry[1] > 0) syncWeight(entry[0], entry[1]);
      });

      // Migrate habit log
      var habitLog = loadState("habitLog", {});
      Object.entries(habitLog).forEach(function(entry) {
        syncHabits(entry[0], entry[1]);
      });

      // Migrate habit notes
      var habitNotes = loadState("habitNotes", {});
      Object.entries(habitNotes).forEach(function(entry) {
        var date = entry[0];
        Object.entries(entry[1]).forEach(function(noteEntry) {
          syncHabitNote(date, parseInt(noteEntry[0]), noteEntry[1]);
        });
      });

      // Migrate step log
      var stepLog = loadState("stepLog", {});
      Object.entries(stepLog).forEach(function(entry) {
        syncSteps(entry[0], entry[1]);
      });

      // Migrate food log
      var foodLog = loadState("foodLog", {});
      Object.entries(foodLog).forEach(function(entry) {
        var date = entry[0];
        var dayLog = entry[1];
        if (dayLog && dayLog.entries) {
          dayLog.entries.forEach(function(foodEntry) {
            syncFoodEntry(foodEntry, date);
          });
        }
      });

      // Migrate exercise logs
      var logData = loadState("logData", {});
      Object.entries(logData).forEach(function(entry) {
        var parts = entry[0].split("-");
        if (parts.length >= 5) {
          var date = parts.slice(0, 3).join("-");
          var exName = parts.slice(3, -1).join("-");
          var setIdx = parseInt(parts[parts.length - 1]);
          syncExerciseLog(date, exName, setIdx, entry[1]);
        }
      });

      // Migrate swapped exercises
      var swapped = loadState("swappedExercises", {});
      Object.entries(swapped).forEach(function(entry) {
        var keyParts = entry[0].split("-");
        if (keyParts.length >= 3) {
          syncExerciseSwap(parseInt(keyParts[0]), parseInt(keyParts[1]), keyParts.slice(2).join("-"), entry[1]);
        }
      });

      // Migrate workout selections
      var ws = loadState("workoutSelection", {});
      Object.entries(ws).forEach(function(entry) {
        if (entry[1] && entry[1].day && entry[1].label) {
          syncWorkoutSelection(entry[0], entry[1]);
        }
      });

      console.log("SH90: Migration complete!");
    };
    migrateToSupabase();

    // ── Restore from Supabase (cloud → localStorage) ──
    // Called on startup. If Supabase has data, it overwrites empty localStorage.
    const restoreFromCloud = async () => {
      if (!supabase) return null;
      try {
        // Check if Supabase has data for this device
        const profileRows = await loadFromSupabase("profiles");
        if (!profileRows || profileRows.length === 0) return null;
        const p = profileRows[0];
        const restored = {};

        // Profile
        restored.profile = {
          name: p.name || "", age: p.age || "", height: p.height || "",
          goalWeight: p.goal_weight || "", notes: p.notes || "",
        };
        restored.theme = p.theme || "arctic";
        restored.textSize = p.text_size || "medium";
        restored.workoutMode = p.workout_mode || "gym";
        restored.calorieGoal = p.calorie_goal || 2000;
        if (p.next_workout_week && p.next_workout_day) {
          restored.nextWorkoutPos = { week: p.next_workout_week, day: p.next_workout_day };
        }

        // Sessions: rows → { "2026-02-18": { week, day, status, completedAt } }
        const sessionRows = await loadFromSupabase("sessions");
        if (sessionRows && sessionRows.length > 0) {
          const sessionLog = {};
          sessionRows.forEach(function(r) {
            sessionLog[r.date] = {
              week: r.week, day: r.day, status: r.status,
              startedAt: r.started_at, completedAt: r.completed_at,
            };
          });
          restored.sessionLog = sessionLog;
        }

        // Weight log: rows → { "2026-02-18": 185.5 }
        const weightRows = await loadFromSupabase("weight_log");
        if (weightRows && weightRows.length > 0) {
          const weightLog = {};
          weightRows.forEach(function(r) { weightLog[r.date] = Number(r.weight); });
          restored.weightLog = weightLog;
        }

        // Habit log: rows → { "2026-02-18": [true, false, ...] }
        const habitRows = await loadFromSupabase("habit_log");
        if (habitRows && habitRows.length > 0) {
          const habitLog = {};
          habitRows.forEach(function(r) {
            habitLog[r.date] = [r.h0, r.h1, r.h2, r.h3, r.h4, r.h5, r.h6, r.h7];
          });
          restored.habitLog = habitLog;
        }

        // Habit notes: rows → { "2026-02-18": { 0: "note", 2: "note" } }
        const noteRows = await loadFromSupabase("habit_notes");
        if (noteRows && noteRows.length > 0) {
          const habitNotes = {};
          noteRows.forEach(function(r) {
            if (!habitNotes[r.date]) habitNotes[r.date] = {};
            habitNotes[r.date][r.habit_index] = r.note;
          });
          restored.habitNotes = habitNotes;
        }

        // Step log: rows → { "2026-02-18": 8500 }
        const stepRows = await loadFromSupabase("step_log");
        if (stepRows && stepRows.length > 0) {
          const stepLog = {};
          stepRows.forEach(function(r) { stepLog[r.date] = r.steps; });
          restored.stepLog = stepLog;
        }

        // Exercise logs: rows → { "2026-02-18-Squat-0": { weight, reps, done } }
        const exRows = await loadFromSupabase("exercise_logs");
        if (exRows && exRows.length > 0) {
          const logData = {};
          exRows.forEach(function(r) {
            var key = r.date + "-" + r.exercise_name + "-" + r.set_index;
            logData[key] = { weight: r.weight || "", reps: r.reps || "", done: !!r.done };
          });
          restored.logData = logData;
        }

        // Swapped exercises: rows → { "5-3-Squat": "Leg Press" }
        const swapRows = await loadFromSupabase("exercise_swaps");
        if (swapRows && swapRows.length > 0) {
          const swapped = {};
          swapRows.forEach(function(r) {
            swapped[r.week + "-" + r.day + "-" + r.original_exercise] = r.swapped_exercise;
          });
          restored.swappedExercises = swapped;
        }

        // Workout selection: rows → { "2026-02-18": { day: 3, label: "ARM A" } }
        const wsRows = await loadFromSupabase("workout_selection");
        if (wsRows && wsRows.length > 0) {
          const ws = {};
          wsRows.forEach(function(r) {
            ws[r.date] = { day: r.day, label: r.label };
          });
          restored.workoutSelection = ws;
        }

        // Food log: rows → { "2026-02-18": { entries: [...] } }
        const foodRows = await loadFromSupabase("food_entries");
        if (foodRows && foodRows.length > 0) {
          const foodLog = {};
          foodRows.forEach(function(r) {
            if (!foodLog[r.date]) foodLog[r.date] = { entries: [] };
            foodLog[r.date].entries.push({
              id: r.entry_id, text: r.food_text, time: r.logged_at,
              items: typeof r.items === "string" ? JSON.parse(r.items) : (r.items || []),
              cal: r.calories || 0, protein: r.protein || 0,
              carbs: r.carbs || 0, fat: r.fat || 0,
            });
          });
          restored.foodLog = foodLog;
        }

        // Save all restored data to localStorage
        if (restored.profile) saveState("profile", restored.profile);
        if (restored.theme) saveState("theme", restored.theme);
        if (restored.textSize) saveState("textSize", restored.textSize);
        if (restored.workoutMode) saveState("workoutMode", restored.workoutMode);
        if (restored.calorieGoal) saveState("calorieGoal", restored.calorieGoal);
        if (restored.nextWorkoutPos) saveState("nextWorkoutPos", restored.nextWorkoutPos);
        if (restored.sessionLog) saveState("sessionLog", restored.sessionLog);
        if (restored.weightLog) saveState("weightLog", restored.weightLog);
        if (restored.habitLog) saveState("habitLog", restored.habitLog);
        if (restored.habitNotes) saveState("habitNotes", restored.habitNotes);
        if (restored.stepLog) saveState("stepLog", restored.stepLog);
        if (restored.logData) saveState("logData", restored.logData);
        if (restored.swappedExercises) saveState("swappedExercises", restored.swappedExercises);
        if (restored.workoutSelection) saveState("workoutSelection", restored.workoutSelection);
        if (restored.foodLog) saveState("foodLog", restored.foodLog);

        console.log("SH90: Restored from cloud");
        return restored;
      } catch (e) {
        console.warn("SH90: Cloud restore failed:", e);
        return null;
      }
    };

    // Expose globally so React component can call it
    window.__sh90_restoreFromCloud = restoreFromCloud;

    // ── BLOCK rendering until cloud restore is done ──
    // This ensures loadState() in useState initializers sees cloud data
    window.__sh90_ready = false;
    (async function() {
      try {
        // Only restore if localStorage looks empty (no profile saved)
        var hasLocal = localStorage.getItem("sh90_profile");
        if (!hasLocal) {
          await restoreFromCloud();
        }
      } catch(e) { console.warn("SH90: Pre-render restore error:", e); }
      window.__sh90_ready = true;
      // Now render the app
      if (window.__sh90_renderApp) window.__sh90_renderApp();
    })();


// ── Theme System ──
const THEMES = {
  midnight: {
    name: "Midnight",
    bg: "#0a0a0f", card: "#13131a", cardAlt: "#1a1a24",

    bg: "#0c0c0c", card: "#161616", cardAlt: "#1c1c1c",
    accent: "#f97316", accentGlow: "rgba(249,115,22,0.12)",
    text: "#fafafa", textDim: "#737373", textMuted: "#404040",
    success: "#4ade80", danger: "#f87171", warning: "#fbbf24",
    border: "#262626", borderLight: "#1a1a1a",
    gradient: "linear-gradient(135deg, #f97316, #fb923c)",
  },
  forest: {
    name: "Forest",
    bg: "#060d08", card: "#0d1a10", cardAlt: "#122216",
    accent: "#4ade80", accentGlow: "rgba(74,222,128,0.1)",
    text: "#e8f5e9", textDim: "#6b8f71", textMuted: "#2d4a32",
    success: "#4ade80", danger: "#ef4444", warning: "#fbbf24",
    border: "#1a3a1f", borderLight: "#142e17",
    gradient: "linear-gradient(135deg, #4ade80, #22c55e)",
  },
  arctic: {

let _currentTextSize = "medium";
const fs = (base) => base + (TEXT_OFFSETS[_currentTextSize] || 0);

// ── Mini Chart Component ──
let _chartId = 0;
function MiniChart({ data, color, height = 60, label }) {
  const [gradId] = useState(() => `grad-${++_chartId}`);
  if (!data || data.length < 2) return null;
  const validData = data.filter(d => d !== null && d !== undefined);
  if (validData.length < 2) return null;
  const min = Math.min(...validData) - 1;
  const max = Math.max(...validData) + 1;
  const range = max - min || 1;
  const w = 100;
  const points = validData.map((v, i) => {
    const x = (i / (validData.length - 1)) * w;
    const y = height - ((v - min) / range) * (height - 10) - 5;
    return `${x},${y}`;
  }).join(" ");
  const areaPoints = points + ` ${w},${height} 0,${height}`;
  return (
    <div style={{ position: "relative" }}>
      {label && <div style={{ fontSize: fs(10), opacity: 0.5, marginBottom: 4 }}>{label}</div>}
      <svg viewBox={`0 0 ${w} ${height}`} style={{ width: "100%", height }}>
        <defs>
          <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.3" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        <polygon points={areaPoints} fill={`url(#${gradId})`} />
        <polyline points={points} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: fs(10), opacity: 0.4, marginTop: 2 }}>
        <span>{validData[0]}</span>
        <span>{validData[validData.length - 1]}</span>
      </div>
    </div>
  );
}
