<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Barbell -->
  <!-- Left plate -->
  <rect x="100" y="180" width="36" height="100" rx="6" fill="#fff" opacity="0.95"/>
  <!-- Right plate -->
  <rect x="376" y="180" width="36" height="100" rx="6" fill="#fff" opacity="0.95"/>
  <!-- Bar -->
  <rect x="136" y="220" width="240" height="20" rx="4" fill="#fff" opacity="0.85"/>
  <!-- Lifter figure -->
  <!-- Head -->
  <circle cx="256" cy="290" r="22" fill="#fff" opacity="0.95"/>
  <!-- Body -->
  <rect x="246" y="312" width="20" height="70" rx="6" fill="#fff" opacity="0.9"/>
  <!-- Left leg -->
  <rect x="226" y="375" width="16" height="55" rx="5" fill="#fff" opacity="0.85" transform="rotate(-8 234 375)"/>
  <!-- Right leg -->
  <rect x="270" y="375" width="16" height="55" rx="5" fill="#fff" opacity="0.85" transform="rotate(8 278 375)"/>
  <!-- Left arm (holding bar) -->
  <rect x="180" y="230" width="14" height="75" rx="5" fill="#fff" opacity="0.85" transform="rotate(15 187 230)"/>
  <!-- Right arm (holding bar) -->
  <rect x="318" y="230" width="14" height="75" rx="5" fill="#fff" opacity="0.85" transform="rotate(-15 325 230)"/>
  <!-- SH90 text -->
  <text x="256" y="475" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="52" fill="#fff" opacity="0.9">SH90</text>
</svg>
